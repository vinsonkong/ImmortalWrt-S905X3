name: Build ImmortalWrt S905X3 (With Amlogic Plugin)

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '24.10.0'
      device_board:
        description: 'Device Board'
        required: true
        default: 's905x3'
      kernel_version:
        description: 'Kernel Branch (ophub/kernel)'
        required: true
        default: '6.6.y'

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for ${{ github.event.inputs.device_board }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Swap File (Prevent OOM)
        run: |
          if [ "$(swapon --show=NAME --noheadings)" = "" ]; then
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          fi
          free -h

      - name: Install Host Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev wget file zstd qemu-utils python3 python3-distutils

      # ==========================================
      # 阶段一：使用 SDK 编译 luci-app-amlogic 插件
      # ==========================================
      - name: Download SDK and Compile Plugin
        run: |
          VERSION=${{ github.event.inputs.immortalwrt_version }}
          # [修正] 使用实际存在的文件名，包含 gcc 和 musl 信息
          SDK_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/armsr/armv8/immortalwrt-sdk-${VERSION}-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          
          echo "Downloading SDK from $SDK_URL"
          wget -q $SDK_URL -O sdk.tar.zst
          
          # 解压 .tar.zst 文件
          # 注意：这里解压出的文件夹名可能还是通用的，但内容是正确的
          tar -I zstd -xf sdk.tar.zst
          
          # 为了保险起见，使用通配符或 mv 处理可能存在的命名差异
          # 通常解压后是一个以版本命名的文件夹
          mv immortalwrt-sdk-${VERSION}-armsr-armv8* sdk
          
          cd sdk
          # 更新 feeds 以获取插件可能依赖的 LuCI 库
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 克隆 ophub 的 amlogic 插件源码
          git clone https://github.com/ophub/luci-app-amlogic.git package/luci-app-amlogic
          
          # 生成默认配置并编译插件
          make defconfig
          make package/luci-app-amlogic/compile V=s
          
          # 将编译好的 amlogic 相关 ipk 复制到上级目录备用
          find bin/packages/ -name "*amlogic*.ipk" -exec cp {} ../ \;
          echo "编译完成的插件包："
          ls -lh ../*amlogic*.ipk

      # ==========================================
      # 阶段二：使用 ImageBuilder 打包完整固件
      # ==========================================
      - name: Download ImageBuilder and Package Firmware
        run: |
          VERSION=${{ github.event.inputs.immortalwrt_version }}
          BUILDER_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/armsr/armv8/immortalwrt-imagebuilder-${VERSION}-armsr-armv8.Linux-x86_64.tar.zst"
          wget -q $BUILDER_URL -O imagebuilder.tar.zst
          tar -I zstd -xf imagebuilder.tar.zst
          mv immortalwrt-imagebuilder-${VERSION}-armsr-armv8.Linux-x86_64 openwrt
          
          cd openwrt
          # 1. 将 SDK 编译出的本地 ipk 放入 packages 目录
          cp ../*amlogic*.ipk packages/
          
          # 2. 重建本地软件包索引，让 ImageBuilder 识别本地 ipk
          make package/index
          
          # 3. 构建镜像，包含 luci、本地 amlogic 插件以及必需的底层工具
          make image PROFILE=generic \
            PACKAGES="luci luci-app-amlogic bash curl tar gzip perl fdisk losetup blkid parted" \
            -j$(nproc)
          
      - name: Package Amlogic Firmware with ophub
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/armsr/armv8/*-rootfs.tar.gz
          openwrt_board: ${{ github.event.inputs.device_board }}
          openwrt_kernel: ${{ github.event.inputs.kernel_version }}
          auto_kernel: true
          builder_name: ImmortalWrt

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ github.event.inputs.immortalwrt_version }}-${{ github.event.inputs.device_board }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}
      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        # 只有在编译成功时才执行
        if: success() 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 自动生成一个唯一的 Tag 名称
          tag_name: ImmortalWrt-${{ github.event.inputs.immortalwrt_version }}-build${{ github.run_number }}
          # Release 的标题
          name: ImmortalWrt S905X3 ${{ github.event.inputs.immortalwrt_version }} (Build ${{ github.run_number }})
          # Release 的描述正文
          body: |
            自动编译的 ImmortalWrt 固件
            - 版本: ${{ github.event.inputs.immortalwrt_version }}
            - 设备: ${{ github.event.inputs.device_board }}
            - 内核: ${{ github.event.inputs.kernel_version }}
          # 上传 ophub 打包出来的固件文件
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
