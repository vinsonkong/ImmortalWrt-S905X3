name: Build immortalwrt s905x3 with ImageBuilder

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '24.10.6'
        type: choice
        options:
          - 23.05.4
          - 23.05.5
          - 23.05.6
          - 23.05.7
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
      device_board:
        description: 'Device Board'
        required: true
        default: 's905x3'
      kernel_version:
        description: 'Kernel Branch (ophub/kernel)'
        required: true
        default: '6.18.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for ${{ inputs.device_board }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Swap File
        run: |
          if [ -z "$(swapon --show=NAME --noheadings)" ]; then
            echo "Creating 4G swap..."
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          fi
          free -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext unzip zlib1g-dev wget file zstd qemu-utils xz-utils curl perl \
            coreutils

      - name: Download & Extract ImmortalWrt ImageBuilder
        run: |
          VERSION=${{ inputs.immortalwrt_version }}
          BASE_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/armsr/armv8"
          
          if [[ "$VERSION" == "23.05."* ]]; then
            EXT="tar.xz"
          else
            EXT="tar.zst"
          fi
          
          BUILDER_URL="${BASE_URL}/immortalwrt-imagebuilder-${VERSION}-armsr-armv8.Linux-x86_64.${EXT}"
          echo "Downloading: $BUILDER_URL"
          wget -q "$BUILDER_URL" -O "imagebuilder.${EXT}"
          
          tar -xf "imagebuilder.${EXT}"
          mv immortalwrt-imagebuilder-*-armsr-armv8.Linux-x86_64 openwrt

      - name: Execute diy.sh for Binary Injection
        run: |
          if [ -f "./diy.sh" ]; then
            echo "🔧 开始执行 diy.sh 二进制注入..."
            chmod +x ./diy.sh
            cd openwrt
            ../diy.sh
            cd ..
            echo "✅ diy.sh 执行完毕"
          else
            echo "⚠️ 未找到 diy.sh，跳过"
          fi

      - name: Inject Custom Files & Packages
        run: |
          echo "📦 开始注入自定义文件与包..."
          
          mkdir -p ./openwrt/packages
          if ls ./custom-packages/*.ipk 1>/dev/null 2>&1; then
            cp ./custom-packages/*.ipk ./openwrt/packages/
            echo "✅ 自定义 ipk 已复制到 openwrt/packages/"
            ls -lh ./openwrt/packages/*.ipk
          else
            echo "⚠️ 无自定义 ipk，跳过"
          fi
          
          mkdir -p ./openwrt/files
          if [ -d "./custom-files" ] && [ "$(ls -A ./custom-files 2>/dev/null)" ]; then
            cp -r ./custom-files/* ./openwrt/files/
            echo "✅ custom-files 已注入"
          else
            echo "⚠️ 无 custom-files，跳过"
          fi
          
          echo "🧹 暴力清洗所有注入文件的 CRLF 换行符..."
          find ./openwrt/files -type f -exec perl -pi -e 's/\r\n/\n/g; s/\r/\n/g' {} + 2>/dev/null || true
          find ./openwrt/files -type f -exec sed -i 's/\r$//' {} + 2>/dev/null || true
          
          echo "🔐 设置文件权限..."
          chmod -R +x ./openwrt/files/usr/bin ./openwrt/files/etc/init.d 2>/dev/null || true
          chmod +x ./openwrt/files/etc/rc.local 2>/dev/null || true
          chmod 700 ./openwrt/files/etc/dropbear 2>/dev/null || true
          chmod 600 ./openwrt/files/etc/dropbear/* 2>/dev/null || true
          
          echo "✅ 注入与清洗完成！"

      - name: Build Rootfs with Custom Config
        run: |
          cd openwrt
          
          # 1. sha256 软链接（Ubuntu coreutils 只提供 sha256sum）
          if ! command -v sha256 &>/dev/null; then
            echo "🔗 创建 sha256 -> sha256sum 软链接..."
            sudo ln -sf "$(command -v sha256sum)" /usr/local/bin/sha256
            echo "✅ sha256 命令已就绪"
          fi
          
          # 2. 仅对 lucky 相关包直接解压注入，其余包保留给 ImageBuilder 原生处理
          LUCKY_PKGS="lucky luci-app-lucky luci-i18n-lucky-zh-cn"
          INJECTED_COUNT=0
          
          if [ -d "packages" ] && ls packages/*.ipk 1>/dev/null 2>&1; then
            echo "📦 检查本地 ipk，分离 lucky 包与其他包..."
            
            for ipk in packages/*.ipk; do
              PKG_NAME=$(basename "$ipk")
              PKG_BASE=$(echo "$PKG_NAME" | sed -E 's/_[^_]+_[^_]+\.ipk$//')
              
              IS_LUCKY=false
              for lp in $LUCKY_PKGS; do
                if [ "$PKG_BASE" = "$lp" ]; then
                  IS_LUCKY=true
                  break
                fi
              done
              
              if [ "$IS_LUCKY" = true ]; then
                TMPDIR=$(mktemp -d)
                tar -xf "$ipk" -C "$TMPDIR" 2>/dev/null || { 
                  echo "⚠️ $PKG_NAME 解压失败"; 
                  rm -rf "$TMPDIR"; 
                  continue; 
                }
                
                DATA_TAR=$(find "$TMPDIR" -maxdepth 1 -name "data.tar.*" 2>/dev/null | head -1)
                if [ -n "$DATA_TAR" ] && [ -f "$DATA_TAR" ]; then
                  tar -xf "$DATA_TAR" -C ../files/ 2>/dev/null || \
                  tar -xzf "$DATA_TAR" -C ../files/ 2>/dev/null || \
                  tar -xJf "$DATA_TAR" -C ../files/ 2>/dev/null || true
                  echo "  ✅ $PKG_NAME → 直接解压注入 files/"
                  INJECTED_COUNT=$((INJECTED_COUNT + 1))
                else
                  echo "  ⚠️ $PKG_NAME 无 data 归档"
                fi
                rm -rf "$TMPDIR"
              else
                echo "  ℹ️ $PKG_NAME → 保留给 opkg 原生安装"
              fi
            done
            
            echo "✅ 共注入 $INJECTED_COUNT 个 lucky 相关包"
          fi
          
          # 3. 读取 packages.txt，自动过滤已注入的 lucky 包
          PACKAGES_LIST=""
          while IFS= read -r line; do
            case "$line" in \#*|"") continue ;; esac
            SKIP=false
            for lp in $LUCKY_PKGS; do
              if [ "$line" = "$lp" ]; then
                SKIP=true
                break
              fi
            done
            if [ "$SKIP" = false ]; then
              PACKAGES_LIST="$PACKAGES_LIST $line"
            fi
          done < ../packages.txt
          
          echo "📦 opkg 将安装: $(echo $PACKAGES_LIST | wc -w) 个包"
          echo "📋 包列表: $PACKAGES_LIST"
          
          # 4. 构建镜像（不手动重建索引，不注册自定义源，完全使用原生机制）
          make image PROFILE=generic FILES="files" ROOTFS_PARTSIZE=1024 PACKAGES="$PACKAGES_LIST" V=s

      - name: Package Amlogic Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/armsr/armv8/*-rootfs.tar.gz
          openwrt_board: ${{ inputs.device_board }}
          openwrt_kernel: ${{ inputs.kernel_version }}
          auto_kernel: true
          builder_name: ImmortalWrt

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ inputs.immortalwrt_version }}-${{ inputs.device_board }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: s905x3-${{ inputs.immortalwrt_version }}-build${{ github.run_number }}
          name: IWrt S905X3 ${{ inputs.immortalwrt_version }} (Build ${{ github.run_number }})
          body: |
            自动编译的 ImmortalWrt 固件 (with ImageBuilder)
            - 版本: ${{ inputs.immortalwrt_version }}
            - 设备: ${{ inputs.device_board }}
            
            ### 📁 自定义内容
            - diy.sh: Navidrome + Lucky 二进制已注入
            - custom-files: 已注入并覆盖系统同名文件
            - custom-packages: lucky 系列直接解压注入，其余包由 opkg 原生安装
            
            ### ⚠️ 刷机提示
            1. 默认 IP: 192.168.30.254
            2. 若修改 DTB，请编辑 BOOT 分区的 /boot/uEnv.txt
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
