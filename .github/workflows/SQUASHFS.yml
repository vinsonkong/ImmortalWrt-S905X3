name: Build IWrt SQUASHFS 24.10 S905X3

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '24.10.6'
        type: choice
        options:
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
          - 25.12.0
      device_board:
        description: 'Device Board'
        required: true
        default: 's905x3'
      kernel_version:
        description: 'Kernel Branch (ophub/kernel)'
        required: true
        default: '6.18.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y
          - 5.10.y_5.15.y
          - 6.1.y_6.6.y
          - 6.12.y_6.18.y
          - 6.1.y_6.12.y
          - 6.1.y_6.18.y

env:
  CONFIG_FILE: .configtest
  DIY_SCRIPT: diy.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for ${{ github.event.inputs.device_board }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Swap File (Prevent Memory Overflow)
        run: |
          if [ "$(swapon --show=NAME --noheadings)" = "" ]; then
            echo "No active swap found. Creating 4G swap..."
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          else
            echo "Swap already active:"
            swapon --show
          fi
          free -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo -E apt-get -qq update
          sudo -E apt-get -qq full-upgrade -y
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
      
      - name: Free up disk space (CRITICAL)
        run: |
          echo "=== Before cleanup ==="
          df -hT
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/.ghcup /opt/hostedtoolcache || true
          docker rmi $(docker images -q) || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/*
          echo "=== After cleanup ==="
          df -hT
      
      - name: Clone ImmortalWrt source code
        run: |
          VERSION=${{ github.event.inputs.immortalwrt_version }}
          git clone --depth 1 -b v${VERSION} https://github.com/immortalwrt/immortalwrt.git openwrt || \
          git clone --depth 1 -b openwrt-${VERSION%.*} https://github.com/immortalwrt/immortalwrt.git openwrt || \
          git clone --depth 1 -b master https://github.com/immortalwrt/immortalwrt.git openwrt
          echo "OPENWRT_PATH=$PWD/openwrt" >> $GITHUB_ENV

      - name: Clone specific plugins (No Feeds)
        run: |
          cd openwrt/package
          mkdir -p custom_plugins
          cd custom_plugins

          echo "=== 1. 克隆 luci-app-amlogic (ophub 官方) ==="
          git clone --depth 1 https://github.com/ophub/luci-app-amlogic.git
          
          echo "=== 2. 提取 luci-app-socat (从 kenzok8 精准剥离) ==="
          git clone --depth 1 https://github.com/kenzok8/small-package.git temp_repo
          [ -d "temp_repo/luci-app-socat" ] && mv temp_repo/luci-app-socat .
          [ -d "temp_repo/socat" ] && mv temp_repo/socat .
          rm -rf temp_repo
          
          echo "=== 当前 custom_plugins 目录下的插件 ==="
          ls -l

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run DIY script (Clean Target & Inject Configs)
        run: |
          cd openwrt
          if [ -f "../${{ env.DIY_SCRIPT }}" ]; then
            mv "../${{ env.DIY_SCRIPT }}" "${{ env.DIY_SCRIPT }}"
            chmod +x ${{ env.DIY_SCRIPT }}
            ./${{ env.DIY_SCRIPT }}
          else
            echo "⚠️ 未找到 diy.sh，跳过自定义配置注入。"
          fi

      - name: Load custom configuration & Force SquashFS
        run: |
          cd openwrt
          
          # 1. 应用自定义 .config
          if [ -f "../${{ env.CONFIG_FILE }}" ]; then
            echo "✅ 找到自定义 .config，正在应用..."
            cp "../${{ env.CONFIG_FILE }}" .config
          else
            echo "⚠️ 未找到 .config 文件，将使用默认配置！"
          fi

          # 2. 第一次 defconfig，让系统解析基础依赖
          make defconfig

          # 3. ⭐ 核心：强制覆盖文件系统配置（防止 armsr 默认值回退到 ext4）
          echo "=== 强制注入 SquashFS 配置 ==="
          # 彻底干掉 ext4
          sed -i 's/^CONFIG_TARGET_ROOTFS_EXT4FS=y/# CONFIG_TARGET_ROOTFS_EXT4FS is not set/' .config
          # 强制开启 squashfs
          sed -i 's/^# CONFIG_TARGET_ROOTFS_SQUASHFS is not set/CONFIG_TARGET_ROOTFS_SQUASHFS=y/' .config
          
          # 追加确保配置存在
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_SQUASHFS_XZ=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS_BLOCK_SIZE=256" >> .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1024" >> .config
          
          # 4. 第二次 defconfig，确保强制注入的配置生效且不破坏依赖
          make defconfig

          # 5. 验证最终配置
          echo "=== 验证最终文件系统配置 ==="
          grep -E "CONFIG_TARGET_ROOTFS_EXT4FS|CONFIG_TARGET_ROOTFS_SQUASHFS|CONFIG_SQUASHFS_XZ" .config
          
          echo "=== 检查关键插件状态 ==="
          grep -E "luci-app-amlogic|luci-app-socat|luci-app-zerotier|luci-theme-argon" .config | grep "=y" || echo "⚠️ 警告：部分关键插件未被成功选中！"

          # 输出最终启用的包数量，方便排查
          echo "=== 最终生成的 .config 中启用的包数量 ==="
          grep "=y" .config | wc -l
          echo "=== 软件包数 ==="
          grep "^CONFIG_PACKAGE_.*=y$" .config | wc -l

          # 检查关键插件是否成功被选中
          echo "=== 检查关键插件状态 ==="
          grep -E "luci-app-amlogic|luci-app-socat|luci-app-zerotier|luci-theme-argon" .config | grep "=y" || echo "⚠️ 警告：部分关键插件未被成功选中！"


      - name: Download package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Package Amlogic Firmware with ophub
        if: steps.compile.outputs.status == 'success'
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz
          openwrt_board: ${{ github.event.inputs.device_board }}
          openwrt_kernel: ${{ github.event.inputs.kernel_version }}
          auto_kernel: true
          builder_name: ImmortalWrt

      - name: Verify SquashFS Format (Quality Gate)
        if: steps.compile.outputs.status == 'success'
        run: |
          echo "=========================================="
          echo "=== 🕵️ 开始验证固件文件系统格式 (Quality Gate) ==="
          echo "=========================================="
          
          # 1. 查找 ophub 输出的固件文件
          IMG_GZ_FILE=$(ls ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz 2>/dev/null | head -n 1)
          IMG_FILE=$(ls ${{ env.PACKAGED_OUTPUTPATH }}/*.img 2>/dev/null | head -n 1)
          IS_EXTRACTED=false
          
          # 如果只有 .img.gz，则解压出一份 .img 用于检测
          if [ -n "$IMG_GZ_FILE" ] && [ -z "$IMG_FILE" ]; then
            echo "发现压缩包: $IMG_GZ_FILE，正在解压以供检测..."
            gunzip -k "$IMG_GZ_FILE"
            IMG_FILE="${IMG_GZ_FILE%.gz}"
            IS_EXTRACTED=true
          fi

          if [ -z "$IMG_FILE" ] || [ ! -f "$IMG_FILE" ]; then
            echo "❌ 致命错误：未找到生成的 .img 固件文件！"
            exit 1
          fi

          echo "🎯 目标固件文件: $IMG_FILE"
          ls -lh "$IMG_FILE"
          
          # 辅助检测：检查文件名标识
          if [[ "$IMG_FILE" == *"squashfs"* ]]; then
            echo "✅ 文件名特征: 包含 'squashfs' 标识。"
          elif [[ "$IMG_FILE" == *"ext4"* ]]; then
            echo "❌ 文件名特征: 包含 'ext4' 标识！"
          fi

          # 2. 核心检测：使用 losetup 挂载镜像并读取分区表
          echo ""
          echo "--- 🔍 正在映射虚拟磁盘并分析分区 ---"
          LOOP_DEV=$(sudo losetup -fP --show "$IMG_FILE")
          echo "映射到循环设备: $LOOP_DEV"
          
          echo ""
          echo "--- 📊 分区文件系统详情 (lsblk) ---"
          lsblk -f "$LOOP_DEV"
          echo "-----------------------------------"
          
          # 3. 判定 Rootfs 分区格式 (ophub 打包的 rootfs 通常在第 2 个分区，即 p2)
          ROOTFS_PART="${LOOP_DEV}p2"
          FINAL_STATUS="unknown"
          
          if [ -b "$ROOTFS_PART" ]; then
            FS_TYPE=$(sudo blkid -s TYPE -o value "$ROOTFS_PART" 2>/dev/null)
            echo "Rootfs 分区 ($ROOTFS_PART) 的文件系统类型为: [ $FS_TYPE ]"
            
            if [ "$FS_TYPE" = "squashfs" ]; then
              echo "🎉 完美确认：Rootfs 分区确实是 SquashFS 格式！"
              FINAL_STATUS="success"
            elif [ "$FS_TYPE" = "ext4" ]; then
              echo "⚠️ 警告：Rootfs 分区是 Ext4 格式！.config 注入可能失败或被覆盖。"
              FINAL_STATUS="failed"
            else
              echo "⚠️ 未知文件系统类型: $FS_TYPE"
            fi
          else
            echo "⚠️ 未找到预期的 p2 分区，尝试遍历所有分区..."
            for part in ${LOOP_DEV}p*; do
              if [ -b "$part" ]; then
                FS_TYPE=$(sudo blkid -s TYPE -o value "$part" 2>/dev/null)
                echo "分区 $part 格式: $FS_TYPE"
                if [ "$FS_TYPE" = "squashfs" ]; then
                  FINAL_STATUS="success"
                fi
              fi
            done
          fi
          
          # 4. 清理环境
          sudo losetup -d "$LOOP_DEV"
          echo "已卸载循环设备: $LOOP_DEV"
          
          # 清理临时解压的 .img 文件，避免被后续步骤重复上传
          if [ "$IS_EXTRACTED" = true ] && [ -f "$IMG_FILE" ]; then
            rm -f "$IMG_FILE"
            echo "已清理临时解压的 .img 文件"
          fi
          
          # 5. 门禁拦截
          echo ""
          echo "=========================================="
          if [ "$FINAL_STATUS" = "success" ]; then
            echo "✅ 质量门禁通过 (PASSED)：固件格式验证为 SquashFS！"
            echo "=========================================="
          else
            echo "❌ 质量门禁拦截 (FAILED)：未检测到 SquashFS 格式！"
            echo "请检查 .config 注入逻辑或 make defconfig 日志。"
            echo "=========================================="
            exit 1  # 触发 CI 失败，阻止上传错误固件
          fi

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt-${{ github.event.inputs.immortalwrt_version }}-${{ github.event.inputs.device_board }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}
      
      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        if: steps.compile.outputs.status == 'success' && github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ImmortalWrtSQUASHFS-${{ github.event.inputs.immortalwrt_version }}-${{ github.run_id }}
          name: ImmortalWrtSQUASHFS ${{ github.event.inputs.immortalwrt_version }} for ${{ github.event.inputs.device_board }}
          body: |
            ### ImmortalWrt 固件信息
            - **版本**: ${{ github.event.inputs.immortalwrt_version }}
            - **设备**: ${{ github.event.inputs.device_board }} (X96 Max)
            - **内核**: ${{ github.event.inputs.kernel_version }}
            - **文件系统**: SquashFS (支持 LuCI 恢复出厂设置)
            - **构建 ID**: ${{ github.run_id }}
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
