name: Build ImmortalWrt S905X3

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '24.10.6'
        type: choice
        options: [23.05.4, 23.05.5, 23.05.6, 23.05.7, 24.10.0, 24.10.1, 24.10.2, 24.10.3, 24.10.4, 24.10.5, 24.10.6]
      device_board:
        description: 'Device Board'
        required: true
        default: 's905x3'
        type: choice
        options: ['s905x3', 's905x4', 's922x', 'r68s', 'r66s', 'rk3588']
      kernel_version:
        description: 'Kernel Branch (ophub/kernel)'
        required: true
        default: '6.18.y'
        type: choice
        options: ['5.10.y', '5.15.y', '6.1.y', '6.6.y', '6.12.y', '6.18.y']

env:
  CONFIG_FILE: .config24
  DIY_SCRIPT: diy.sh
  TZ: Asia/Shanghai
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for ${{ inputs.device_board }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create Swap File
        run: |
          if [ -z "$(swapon --show=NAME --noheadings)" ]; then
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          fi
          free -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo timedatectl set-timezone "$TZ"
          sudo -E apt-get -qq update
          sudo -E apt-get -qq full-upgrade -y
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools libpython3-dev qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/.ghcup /opt/hostedtoolcache || true
          docker rmi $(docker images -q) || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/*
          df -hT

      - name: Clone ImmortalWrt source code
        run: |
          VERSION="${{ inputs.immortalwrt_version }}"
          git clone --depth 1 -b v${VERSION} https://github.com/immortalwrt/immortalwrt.git openwrt || \
          git clone --depth 1 -b openwrt-${VERSION%.*} https://github.com/immortalwrt/immortalwrt.git openwrt || \
          git clone --depth 1 -b master https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Clone specific plugins
        run: |
          cd openwrt/package
          mkdir -p custom_plugins && cd custom_plugins
          git clone --depth 1 https://github.com/ophub/luci-app-amlogic.git
          git clone --depth 1 https://github.com/kenzok8/small-package.git temp_repo
          [ -d "temp_repo/luci-app-socat" ] && cp -r temp_repo/luci-app-socat .
          [ -d "temp_repo/socat" ] && cp -r temp_repo/socat .
          rm -rf temp_repo

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Custom Binaries
        run: |
          if [ -d "custom-files" ]; then
            mkdir -p openwrt/files
            cp -r custom-files/* openwrt/files/ 2>/dev/null || true
            find openwrt/files/usr/bin openwrt/files/etc/init.d -type f -exec chmod +x {} \; 2>/dev/null || true
          fi

      - name: Run DIY script
        run: |
          cd openwrt
          if [ -f "../${{ env.DIY_SCRIPT }}" ]; then
            chmod +x "../${{ env.DIY_SCRIPT }}"
            ./"../${{ env.DIY_SCRIPT }}"
          fi

      - name: Load custom configuration
        run: |
          cd openwrt
          [ -f "../${{ env.CONFIG_FILE }}" ] && cp "../${{ env.CONFIG_FILE }}" .config
          echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1024" >> .config
          make defconfig

      - name: Download package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          if make -j$(nproc); then
            echo "status=success" >> $GITHUB_OUTPUT
          elif make -j1 V=s; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Collect and Index kmods
        if: steps.compile.outputs.status == 'success'
        run: |
          echo -e '#!/bin/sh\nsha256sum "$@" | awk "{print \$1}"' | sudo tee /usr/local/bin/sha256 > /dev/null
          sudo chmod +x /usr/local/bin/sha256
          
          cd openwrt
          mkdir -p ../kmods-repo
          find bin/packages bin/targets -type f -name "kmod-*.ipk" -exec cp {} ../kmods-repo/ \; 2>/dev/null || true
          
          cd ../kmods-repo
          ../openwrt/scripts/ipkg-make-index.sh . > Packages
          gzip -c Packages > Packages.gz
          tar -czf ../kmods-repo.tar.gz -C . .

      - name: Package Amlogic Firmware
        if: steps.compile.outputs.status == 'success'
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/*/*/*rootfs.tar.gz
          openwrt_board: ${{ inputs.device_board }}
          openwrt_kernel: ${{ inputs.kernel_version }}
          auto_kernel: true
          builder_name: ImmortalWrt

      - name: Organize and Rename Firmware Files
        if: steps.compile.outputs.status == 'success'
        run: |
          mkdir -p openwrt-out
          
          echo "=== 🔍 正在全局搜索固件文件 ==="
          # 【核心修正】不依赖可能失效的变量，直接在整个工作空间中搜索 .img 或 .img.gz 所在的目录
          FIRMWARE_DIR=$(find /home/runner/work/ -type f $ -name "*.img" -o -name "*.img.gz" $ -exec dirname {} \; 2>/dev/null | head -n 1)
          
          if [ -z "$FIRMWARE_DIR" ]; then
            echo "❌ 错误: 在 /home/runner/work/ 下未找到任何 .img 或 .img.gz 固件文件！"
            echo "列出所有名为 out 的目录以供调试："
            find /home/runner/work/ -type d -name "out"
            exit 1
          fi

          echo "=== 📂 固件源目录检测为: $FIRMWARE_DIR ==="
          ls -lh "$FIRMWARE_DIR"
          
          # 复制所有 img 和 img.gz 文件到 openwrt-out
          cp -f "$FIRMWARE_DIR"/*.img "$FIRMWARE_DIR"/*.img.gz openwrt-out/ 2>/dev/null || true
          
          # 检查是否复制成功
          if [ $(ls openwrt-out/*.img* 2>/dev/null | wc -l) -eq 0 ]; then
            echo "❌ 错误: 复制固件文件失败！"
            exit 1
          fi

          # 重命名逻辑
          BUILD_TIME=$(date +'%Y%m%d%H%M')
          DEVICE="${{ inputs.device_board }}"
          VERSION="${{ inputs.immortalwrt_version }}"
          
          cd openwrt-out
          for file in *.img *.img.gz; do
            if [ -f "$file" ]; then
              if [[ "$file" == *.img.gz ]]; then
                ext=".img.gz"
              else
                ext=".img"
              fi
              
              # 提取基础名称，防止重命名时后缀叠加
              base_name="${file%$ext}"
              new_name="${DEVICE}-immortalwrt_${VERSION}_${BUILD_TIME}${ext}"
              
              # 如果有多个同后缀文件，加上原始名称的一部分以防覆盖
              if [ $(ls *$ext 2>/dev/null | wc -l) -gt 1 ]; then
                new_name="${DEVICE}-immortalwrt_${VERSION}_${BUILD_TIME}_${base_name##*_}${ext}"
              fi
              
              mv "$file" "$new_name"
              echo "✅ Renamed: $file -> $new_name"
            fi
          done
          cd ..
          
          # 移动 kmods (如果存在)
          if [ -f "kmods-repo.tar.gz" ]; then
            mv kmods-repo.tar.gz openwrt-out/
          fi
          
          echo "=========================================="
          echo "📦 最终准备上传的文件:"
          ls -lh openwrt-out/
          echo "=========================================="

      - name: Upload Firmware to Artifact
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ inputs.immortalwrt_version }}-${{ inputs.device_board }}
          path: openwrt-out/
          retention-days: 7

      - name: Create Release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: lWrt-kmods-${{ inputs.immortalwrt_version }}-${{ inputs.device_board }}-${{ github.run_id }}
          name: IWrt-kmods-${{ inputs.immortalwrt_version }} for ${{ inputs.device_board }}-${{ github.run_id }}
          body: |
            ImmortalWrt 固件
            - **版本**: ${{ inputs.immortalwrt_version }}
            - **设备**: ${{ inputs.device_board }}
            - **内核**: ${{ inputs.kernel_version }}
            - **构建时间**: ${{ github.run_id }}
          files: openwrt-out/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
