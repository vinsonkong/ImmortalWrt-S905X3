name: Build s905x3 with ImageBuilder

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '24.10.6'
        type: choice
        options:
          - 23.05.4
          - 23.05.5
          - 23.05.6
          - 23.05.7
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
      device_board:
        description: 'Device Board'
        required: true
        default: 's905x3'
      kernel_version:
        description: 'Kernel Branch (ophub/kernel)'
        required: true
        default: '6.18.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for ${{ inputs.device_board }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Swap File
        run: |
          if [ -z "$(swapon --show=NAME --noheadings)" ]; then
            echo "Creating 4G swap..."
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          fi
          free -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext unzip zlib1g-dev wget file zstd qemu-utils xz-utils curl

      - name: Download & Extract ImmortalWrt ImageBuilder
        run: |
          VERSION=${{ inputs.immortalwrt_version }}
          BASE_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/armsr/armv8"
          
          if [[ "$VERSION" == "23.05."* ]]; then
            EXT="tar.xz"
          else
            EXT="tar.zst"
          fi
          
          BUILDER_URL="${BASE_URL}/immortalwrt-imagebuilder-${VERSION}-armsr-armv8.Linux-x86_64.${EXT}"
          echo "Downloading: $BUILDER_URL"
          wget -q "$BUILDER_URL" -O "imagebuilder.${EXT}"
          
          tar -xf "imagebuilder.${EXT}"
          mv immortalwrt-imagebuilder-*-armsr-armv8.Linux-x86_64 openwrt

      - name: Execute diy.sh for Static Config Injection
        run: |
          if [ -f "./diy.sh" ]; then
            echo "🔧 开始执行 diy.sh 静态配置注入..."
            chmod +x ./diy.sh
            cd openwrt
            ../diy.sh
            cd ..
            echo "✅ diy.sh 执行完毕"
          else
            echo "⚠️ 未找到 diy.sh，跳过"
          fi
       
      - name: Inject Custom Files & Packages
        run: |
          echo "📦 开始注入自定义文件与包..."
          
          # 1. 注入 packages (如果没有则忽略)
          mkdir -p ./openwrt/packages
          cp ./custom-packages/*.ipk ./openwrt/packages/ 2>/dev/null || echo "⚠️ 无自定义 ipk，跳过"
          
          # 2. 注入 files (如果没有则忽略)
          mkdir -p ./openwrt/files
          cp -r ./custom-files/* ./openwrt/files/ 2>/dev/null || echo "⚠️ 无 custom-files，跳过"
          
          # 3. 暴力清洗 CRLF (解决 uhttpd 编译 EOF 报错的核心)
          echo "🧹 暴力清洗所有注入文件的 CRLF 换行符..."
          find ./openwrt/files -type f -exec perl -pi -e 's/\r\n/\n/g; s/\r/\n/g' {} + 2>/dev/null || true
          find ./openwrt/files -type f -exec sed -i 's/\r$//' {} + 2>/dev/null || true
          
          # 4. 设置权限
          echo "🔐 设置文件权限..."
          chmod -R +x ./openwrt/files/usr/bin ./openwrt/files/etc/init.d 2>/dev/null || true
          chmod +x ./openwrt/files/etc/rc.local 2>/dev/null || true
          chmod 700 ./openwrt/files/etc/dropbear 2>/dev/null || true
          chmod 600 ./openwrt/files/etc/dropbear/* 2>/dev/null || true
          
          echo "✅ 注入与清洗完成！"

      - name: Build Rootfs with Custom Config
        run: |
          cd openwrt
          
          # 👇 新增：在编译前，打印 system 配置，肉眼检查是否还有 ^M (CRLF)
          echo "=== 检查 files/etc/config/system 隐藏字符 (如果有 ^M 说明清洗失败) ==="
          cat -A files/etc/config/system 2>/dev/null || echo "文件不存在"
          echo "========================================================================
          
          PACKAGES_LIST="acpid attr base-files bash bc blkid blockd bsdtar busybox bzip2 \
            cgi-io chattr coremark coreutils coreutils-base64 coreutils-nohup coreutils-truncate \
            gawk getopt git gzip htop iconv jq jshn libjson-script openssh-sftp-server \
            perl-http-date perlbase-file perlbase-getopt perlbase-time perlbase-unicode perlbase-utf8 \
            php8 php8-cgi php8-mod-curl php8-mod-openssl php8-mod-session php8-mod-zip php8-mod-mbstring \
            pigz pv rename tar ttyd unzip uuidgen whereis which xz xz-utils ziptool zstd \
            block-mount btrfs-progs dosfstools dumpe2fs e2freefrag e2fsprogs exfat-mkfs \
            f2fs-tools f2fsck fdisk kmod-fs-ext4 kmod-fs-f2fs kmod-fs-ksmbd kmod-fs-cifs \
            kmod-usb-storage kmod-usb-storage-uas kmod-usb-printer \
            losetup lsattr lsblk lscpu mkf2fs mount-utils ntfs-3g parted resize2fs tune2fs xfs-fsck xfs-mkfs \
            comgt comgt-ncm curl iw iwinfo openssl-util ppp ppp-mod-pppoe \
            uclient-fetch uqmi usb-modeswitch wget-ssl wpad-basic wwan \
            kmod-brcmfmac kmod-brcmutil kmod-cfg80211 kmod-mac80211 \
            lucky luci-app-lucky luci-i18n-lucky-zh-cn \
            ffmpeg libffmpeg-full \
            # luci-i18n-filebrowser-go-zh-cn \
            luci-app-easytier luci-app-zerotier luci-i18n-zerotier-zh-cn \
            # luci-app-ddns-go luci-i18n-ddns-go-zh-cn \
            containerd docker docker-compose dockerd runc tini \
            luci-lib-docker luci-app-dockerman luci-i18n-dockerman-zh-cn \
            luci luci-base luci-compat luci-i18n-base-zh-cn luci-lib-base \
            luci-lib-ip luci-lib-ipkg luci-lib-jsonc luci-lib-nixio \
            luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
            luci-proto-3g luci-proto-ipip luci-proto-ipv6 luci-proto-ncm luci-proto-openconnect \
            luci-proto-ppp luci-proto-qmi luci-proto-relay \
            uhttpd uhttpd-mod-ubus liblucihttp liblucihttp-lua \
            luci-theme-argon \
            luci-app-amlogic luci-i18n-amlogic-zh-cn \
            luci-app-firewall luci-i18n-firewall-zh-cn \
            luci-app-package-manager luci-app-ttyd luci-i18n-ttyd-zh-cn \
            # luci-app-wol luci-i18n-wol-zh-cn \
            luci-app-diskman luci-i18n-diskman-zh-cn \
            luci-app-hd-idle luci-i18n-hd-idle-zh-cn \
            aria2 luci-app-aria2 luci-i18n-aria2-zh-cn \
            samba4-server luci-app-samba4 luci-i18n-samba4-zh-cn luci-i18n-ksmbd-zh-cn \
            cifsmount luci-i18n-cifs-mount-zh-cn \
            nfs-kernel-server luci-i18n-nfs-zh-cn \
            # minidlna luci-i18n-minidlna-zh-cn \
            zoneinfo-asia zoneinfo-core"
          
          make image PROFILE=generic FILES="files" ROOTFS_PARTSIZE=1024 PACKAGES="$PACKAGES_LIST" V=s

      - name: Package Amlogic Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/armsr/armv8/*-rootfs.tar.gz
          openwrt_board: ${{ inputs.device_board }}
          openwrt_kernel: ${{ inputs.kernel_version }}
          auto_kernel: true
          builder_name: ImmortalWrt


      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ inputs.immortalwrt_version }}-${{ inputs.device_board }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: IWrt-${{ inputs.immortalwrt_version }}-build${{ github.run_number }}
          name: IWrt S905X3 ${{ inputs.immortalwrt_version }} (Build ${{ github.run_number }})
          body: |
            自动编译的 ImmortalWrt 固件 (with ImageBuilder)
            - 版本: ${{ inputs.immortalwrt_version }}
            - 设备: ${{ inputs.device_board }}
            
            ### 📁 自定义内容
            - diy.sh: 静态配置已注入
            - Dropbear: 已强化 /etc/dropbear 目录归属(root:root)及严格权限(700/600)
            - custom-files: 已注入并覆盖系统同名文件
            - custom-packages: 本地 .ipk 已预装
            
            ### ⚠️ 刷机提示
            1. 默认 IP: 192.168.30.254
            2. 若修改 DTB，请编辑 BOOT 分区的 /boot/uEnv.txt
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
