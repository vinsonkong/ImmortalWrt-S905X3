name: Build s905x3 with ImageBuilder

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '24.10.6'
        type: choice
        options:
          - 23.05.4
          - 23.05.5
          - 23.05.6
          - 23.05.7
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6
      device_board:
        description: 'Device Board'
        required: true
        default: 's905x3'
      kernel_version:
        description: 'Kernel Branch (ophub/kernel)'
        required: true
        default: '6.18.y'
        type: choice
        options:
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
          - 6.12.y
          - 6.18.y

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build for ${{ inputs.device_board }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Swap File
        run: |
          if [ -z "$(swapon --show=NAME --noheadings)" ]; then
            echo "Creating 4G swap..."
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          fi
          free -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential libncurses5-dev gawk git subversion \
            libssl-dev gettext unzip zlib1g-dev wget file zstd qemu-utils xz-utils curl perl \
            coreutils

      - name: Download & Extract ImmortalWrt ImageBuilder
        run: |
          VERSION=${{ inputs.immortalwrt_version }}
          BASE_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/armsr/armv8"
          
          if [[ "$VERSION" == "23.05."* ]]; then
            EXT="tar.xz"
          else
            EXT="tar.zst"
          fi
          
          BUILDER_URL="${BASE_URL}/immortalwrt-imagebuilder-${VERSION}-armsr-armv8.Linux-x86_64.${EXT}"
          echo "Downloading: $BUILDER_URL"
          wget -q "$BUILDER_URL" -O "imagebuilder.${EXT}"
          
          tar -xf "imagebuilder.${EXT}"
          mv immortalwrt-imagebuilder-*-armsr-armv8.Linux-x86_64 openwrt

      - name: Execute diy.sh for Binary Injection
        run: |
          if [ -f "./diy.sh" ]; then
            echo "🔧 开始执行 diy.sh 二进制注入..."
            chmod +x ./diy.sh
            cd openwrt
            ../diy.sh
            cd ..
            echo "✅ diy.sh 执行完毕"
          else
            echo "⚠️ 未找到 diy.sh，跳过"
          fi

      - name: Inject Custom Files & Packages
        run: |
          echo "📦 开始注入自定义文件与包..."
          
          mkdir -p ./openwrt/packages
          if ls ./custom-packages/*.ipk 1>/dev/null 2>&1; then
            cp ./custom-packages/*.ipk ./openwrt/packages/
            echo "✅ 自定义 ipk 已复制到 openwrt/packages/"
            ls -lh ./openwrt/packages/*.ipk
          else
            echo "⚠️ 无自定义 ipk，跳过"
          fi
          
          mkdir -p ./openwrt/files
          if [ -d "./custom-files" ] && [ "$(ls -A ./custom-files 2>/dev/null)" ]; then
            cp -r ./custom-files/* ./openwrt/files/
            echo "✅ custom-files 已注入"
          else
            echo "⚠️ 无 custom-files，跳过"
          fi
          
          echo "🧹 暴力清洗所有注入文件的 CRLF 换行符..."
          find ./openwrt/files -type f -exec perl -pi -e 's/\r\n/\n/g; s/\r/\n/g' {} + 2>/dev/null || true
          find ./openwrt/files -type f -exec sed -i 's/\r$//' {} + 2>/dev/null || true
          
          echo "🔐 设置文件权限..."
          chmod -R +x ./openwrt/files/usr/bin ./openwrt/files/etc/init.d 2>/dev/null || true
          chmod +x ./openwrt/files/etc/rc.local 2>/dev/null || true
          chmod 700 ./openwrt/files/etc/dropbear 2>/dev/null || true
          chmod 600 ./openwrt/files/etc/dropbear/* 2>/dev/null || true
          
          echo "✅ 注入与清洗完成！"

      - name: Build Rootfs with Custom Config
        run: |
          cd openwrt
          
          # 1. 创建 sha256 软链接（Ubuntu coreutils 只提供 sha256sum）
          if ! command -v sha256 &>/dev/null; then
            echo "🔗 创建 sha256 -> sha256sum 软链接..."
            sudo ln -sf "$(command -v sha256sum)" /usr/local/bin/sha256
            echo "✅ sha256 命令已就绪"
          fi
          
          # 2. 终极修复：重写 ipk 架构为 all + 移除无效依赖 + 重建索引
          if [ -d "packages" ] && ls packages/*.ipk 1>/dev/null 2>&1; then
            echo "📦 检测到本地 ipk，正在预处理并重写架构..."
            
            mkdir -p /tmp/ipk-fix
            FIXED_COUNT=0
            
            for ipk in packages/*.ipk; do
              PKG_NAME=$(basename "$ipk")
              WORK_DIR="/tmp/ipk-fix/$PKG_NAME"
              mkdir -p "$WORK_DIR"
              
              # 解压 ipk
              tar -xzf "$ipk" -C "$WORK_DIR" 2>/dev/null || { echo "⚠️ $PKG_NAME 解压失败，跳过"; continue; }
              
              # 查找 control 归档（兼容 .tar.gz / .tar.zst）
              CONTROL_TAR=$(ls "$WORK_DIR"/control.tar.* 2>/dev/null | head -1)
              if [ -z "$CONTROL_TAR" ] || [ ! -f "$CONTROL_TAR" ]; then
                echo "⚠️ $PKG_NAME 无 control 归档，跳过"
                rm -rf "$WORK_DIR"
                continue
              fi
              
              mkdir -p "$WORK_DIR/ctrl"
              tar -xzf "$CONTROL_TAR" -C "$WORK_DIR/ctrl" 2>/dev/null || \
              tar -xf "$CONTROL_TAR" -C "$WORK_DIR/ctrl" 2>/dev/null || true
              
              CONTROL_FILE="$WORK_DIR/ctrl/control"
              if [ ! -s "$CONTROL_FILE" ]; then
                echo "⚠️ $PKG_NAME 无 control 文件，跳过"
                rm -rf "$WORK_DIR"
                continue
              fi
              
              # 核心操作1: 强制重写 Architecture 为 all
              OLD_ARCH=$(grep "^Architecture:" "$CONTROL_FILE" | awk '{print $2}')
              sed -i 's/^Architecture:.*/Architecture: all/' "$CONTROL_FILE"
              
              # 核心操作2: 移除对 lucky 主程序包的依赖（diy.sh 已注入二进制）
              if grep -q "^Depends:.*\blucky\b" "$CONTROL_FILE"; then
                sed -i '/^Depends:/s/$^\|, $lucky$,\|$$/\1\2/' "$CONTROL_FILE"
                sed -i '/^Depends:/s/, */, /g; s/^Depends: , /Depends: /; s/, *$//' "$CONTROL_FILE"
                echo "  🔧 $PKG_NAME: 移除了 lucky 依赖"
              fi
              
              # 重新打包 control.tar.gz
              cd "$WORK_DIR/ctrl"
              tar -czf "$WORK_DIR/control.tar.gz" ./* 2>/dev/null
              cd - > /dev/null
              
              # 重新打包 ipk（兼容 data.tar.gz / data.tar.zst）
              DATA_TAR=$(ls "$WORK_DIR"/data.tar.* 2>/dev/null | head -1)
              cd "$WORK_DIR"
              tar -czf "$ipk" ./debian-binary "$DATA_TAR" ./control.tar.gz 2>/dev/null
              cd - > /dev/null
              
              echo "  ✅ $PKG_NAME: Architecture $OLD_ARCH → all"
              FIXED_COUNT=$((FIXED_COUNT + 1))
              rm -rf "$WORK_DIR"
            done
            
            rm -rf /tmp/ipk-fix
            echo "✅ 共预处理 $FIXED_COUNT 个 ipk"
            
            # 3. 使用 make_index.pl 重建索引
            if [ -f "scripts/make_index.pl" ]; then
              echo "✅ 使用 make_index.pl 生成索引..."
              perl scripts/make_index.pl packages/ > packages/Packages
            else
              echo "⚠️ make_index.pl 不存在，使用严格格式手动生成..."
              > packages/Packages
              for ipk in packages/*.ipk; do
                TMPDIR=$(mktemp -d)
                tar -xzf "$ipk" ./control.tar.gz -C "$TMPDIR" 2>/dev/null || continue
                tar -xzf "$TMPDIR/control.tar.gz" ./control -C "$TMPDIR" 2>/dev/null || continue
                if [ -s "$TMPDIR/control" ]; then
                  {
                    cat "$TMPDIR/control"
                    echo "Filename: $(basename "$ipk")"
                    echo "Size: $(stat -c%s "$ipk")"
                    echo "SHA256sum: $(sha256sum "$ipk" | awk '{print $1}')"
                    echo "MD5Sum: $(md5sum "$ipk" | awk '{print $1}')"
                    echo ""
                  } >> packages/Packages
                fi
                rm -rf "$TMPDIR"
              done
            fi
            
            gzip -c packages/Packages > packages/Packages.gz
            
            # 4. 注册本地源到 repositories.conf
            CUSTOM_FEED="src/gz local_packages file://$(pwd)/packages"
            if ! grep -q "local_packages" repositories.conf 2>/dev/null; then
              echo "$CUSTOM_FEED" >> repositories.conf
              echo "✅ 已添加本地源到 repositories.conf"
            fi
            
            echo "--- repositories.conf 内容 ---"
            cat repositories.conf
            echo "--- Packages 索引预览 (含架构) ---"
            grep -E "^(Package|Architecture):" packages/Packages || echo "(空)"
            echo "---------------------------------"
          else
            echo "ℹ️ 无本地 ipk，跳过预处理与索引重建"
          fi
          
          # 5. 读取 packages.txt
          PACKAGES_LIST=""
          while IFS= read -r line; do
            case "$line" in \#*|"") continue ;; esac
            PACKAGES_LIST="$PACKAGES_LIST $line"
          done < ../packages.txt
          
          echo "📦 即将安装: $(echo $PACKAGES_LIST | wc -w) 个包"
          echo "📋 包列表: $PACKAGES_LIST"
          
          # 6. 构建镜像
          make image PROFILE=generic FILES="files" ROOTFS_PARTSIZE=1024 PACKAGES="$PACKAGES_LIST" V=s

      - name: Package Amlogic Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt/bin/targets/armsr/armv8/*-rootfs.tar.gz
          openwrt_board: ${{ inputs.device_board }}
          openwrt_kernel: ${{ inputs.kernel_version }}
          auto_kernel: true
          builder_name: ImmortalWrt

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-${{ inputs.immortalwrt_version }}-${{ inputs.device_board }}
          path: ${{ env.PACKAGED_OUTPUTPATH }}

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: IWrt-${{ inputs.immortalwrt_version }}-build${{ github.run_number }}
          name: IWrt S905X3 ${{ inputs.immortalwrt_version }} (Build ${{ github.run_number }})
          body: |
            自动编译的 ImmortalWrt 固件 (with ImageBuilder)
            - 版本: ${{ inputs.immortalwrt_version }}
            - 设备: ${{ inputs.device_board }}
            
            ### 📁 自定义内容
            - diy.sh: Navidrome + Lucky 二进制已注入
            - custom-files: 已注入并覆盖系统同名文件
            - custom-packages: 本地 .ipk 已预装（架构重写+依赖剥离+索引重建）
            
            ### ⚠️ 刷机提示
            1. 默认 IP: 192.168.30.254
            2. 若修改 DTB，请编辑 BOOT 分区的 /boot/uEnv.txt
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
