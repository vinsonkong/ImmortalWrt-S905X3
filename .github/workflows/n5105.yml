name: Build ImmortalWrt N5105 SquashFS

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: 'ImmortalWrt Version'
        required: true
        default: '23.05.7'
        type: choice
        options:
          - 23.05.4
          - 23.05.5
          - 23.05.6
          - 23.05.7
          - 24.10.0
          - 24.10.1
          - 24.10.2
          - 24.10.3
          - 24.10.4
          - 24.10.5
          - 24.10.6

jobs:
  build:
    runs-on: ubuntu-22.04
    name: Build ImmortalWrt N5105 SquashFS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Swap File (Prevent Memory Overflow)
        run: |
          if [ "$(swapon --show=NAME --noheadings)" = "" ]; then
            echo "No active swap found. Creating 4G swap..."
            sudo fallocate -l 4G /mnt/swapfile
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            sudo swapon /mnt/swapfile
          else
            echo "Swap already active:"
            swapon --show
          fi
          free -h

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev wget file zstd qemu-utils xz-utils curl

      - name: Download & Extract ImmortalWrt ImageBuilder
        run: |
          VERSION=${{ github.event.inputs.immortalwrt_version }}
          if [[ "$VERSION" == "23.05."* ]]; then
            BUILDER_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/x86/64/immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64.tar.xz"
            echo "Downloading 23.05.x x86_64 ImageBuilder (xz format): $BUILDER_URL"
            wget -q $BUILDER_URL -O imagebuilder.tar.xz
            tar -xf imagebuilder.tar.xz
          else
            BUILDER_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/x86/64/immortalwrt-imagebuilder-${VERSION}-x86-64.Linux-x86_64.tar.zst"
            echo "Downloading 24.10+ x86_64 ImageBuilder (zstd format): $BUILDER_URL"
            wget -q $BUILDER_URL -O imagebuilder.tar.zst
            tar -I zstd -xf imagebuilder.tar.zst
          fi
          mv immortalwrt-imagebuilder-*-x86-64.Linux-x86_64 openwrt

      - name: Inject Custom Files & ASPM Fix
        run: |
          CUSTOM_PKG_DIR="./custom-packagesX86"
          IB_PKG_DIR="./openwrt/packages"
          if [ -d "$CUSTOM_PKG_DIR" ] && [ "$(ls -A $CUSTOM_PKG_DIR 2>/dev/null)" ]; then
            echo "📦 注入自定义 ipk 包..."
            mkdir -p "$IB_PKG_DIR"
            cp "$CUSTOM_PKG_DIR"/*.ipk "$IB_PKG_DIR/"
            echo "✅ 包注入完成: $(ls $IB_PKG_DIR/*.ipk 2>/dev/null | wc -l) 个"
          else
            echo "⚠️ 未找到 custom-packages 目录或为空，跳过包注入"
          fi
          
          CUSTOM_FILES_DIR="./custom-files"
          IB_FILES_DIR="./openwrt/files"
          mkdir -p "$IB_FILES_DIR/etc/uci-defaults"
          
          cat > "$IB_FILES_DIR/etc/uci-defaults/99-disable-aspm.sh" << 'EOF'
          #!/bin/sh
          GRUB_ENV="/etc/config/grub"
          KERNEL_PARAMS="pcie_aspm=off igc.EEE=0"
          if [ -f "$GRUB_ENV" ]; then
              if ! grep -q "pcie_aspm=off" "$GRUB_ENV"; then
                  uci set grub.@global[0].cmdline_extra="$KERNEL_PARAMS"
                  uci commit grub
                  echo "✅ ASPM 已通过 UCI 禁用"
              fi
          fi
          EOF
          chmod +x "$IB_FILES_DIR/etc/uci-defaults/99-disable-aspm.sh"
          
          if [ -d "$CUSTOM_FILES_DIR" ]; then
            echo "📦 注入 custom-files 到 ImageBuilder..."
            cp -r "$CUSTOM_FILES_DIR"/* "$IB_FILES_DIR/"
            find "$IB_FILES_DIR/usr/bin" -type f -exec chmod +x {} \; 2>/dev/null || true
            find "$IB_FILES_DIR/etc/init.d" -type f -exec chmod +x {} \; 2>/dev/null || true
            
            echo "🔐 修复 Dropbear 及配置文件权限..."
            find "$IB_FILES_DIR/etc/config" -type f -exec chmod 600 {} \; 2>/dev/null || true
            [ -f "$IB_FILES_DIR/etc/config/dropbear" ] && chmod 600 "$IB_FILES_DIR/etc/config/dropbear"
            if [ -d "$IB_FILES_DIR/root/.ssh" ]; then
              chmod 700 "$IB_FILES_DIR/root/.ssh"
              find "$IB_FILES_DIR/root/.ssh" -type f -name "authorized_keys*" -exec chmod 600 {} \;
            fi
            find "$IB_FILES_DIR/etc/dropbear" -type f -name "dropbear_*_host_key" -exec chmod 600 {} \; 2>/dev/null || true
            echo "✅ 文件注入及权限修复完成"
          else
            echo "⚠️ 未找到 custom-files 目录，仅注入了 ASPM 修复脚本"
          fi

      # ⭐ 新增：GitHub 网络连通性检测与重试
      - name: Check GitHub Network Connectivity
        run: |
          echo "🔍 检测 GitHub 网络连接..."
          for i in {1..5}; do
            if curl -s --connect-timeout 10 -f https://github.com > /dev/null 2>&1; then
              echo "✅ GitHub 网络连接正常"
              exit 0
            else
              echo "⚠️ GitHub 连接失败，正在重试 ($i/5)..."
              sleep 10
            fi
          done
          echo "❌ 无法连接到 GitHub，请检查 Actions 运行器网络环境或稍后重试。"
          exit 1

      # ⭐ 替换为 sbwml + kiddin9 第三方源（含 Git 容错配置）
      - name: Clone Third-Party Packages
        run: |
          cd openwrt
          mkdir -p packages
          
          # 配置 Git 低速超时，避免无限挂起
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 60
          git config --global http.postBuffer 524288000
          
          echo "📥 正在克隆 sbwml/openwrt_packages 仓库..."
          git clone --depth 1 https://github.com/sbwml/openwrt_packages packages/sbwml
          
          # echo "📥 正在克隆 kiddin9/openwrt-packages 仓库..."
          # git clone --depth 1 https://github.com/kiddin9/openwrt-packages packages/kiddin9
          
          echo "✅ 第三方插件仓库克隆完成"
          ls -la packages/
          cd ..

      - name: Build Rootfs with SquashFS Config
        run: |
          cd openwrt
          
          cat >> .config << EOF
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_SQUASHFS_ZSTD=y
          CONFIG_SQUASHFS_BLOCK_SIZE=262144
          EOF
          
          make image PROFILE=generic \
            FILES="files" \
            ROOTFS_PARTSIZE=1024 \
            PACKAGES="\
              base-files busybox bash curl wget-ssl uclient-fetch ca-bundle ppp ppp-mod-pppoe acpid \
              kmod-drm-i915‌ i915-firmware-dmc \
              kmod-igc kmod-r8125 kmod-e1000e kmod-9pnet kmod-9pvirtio \
              luci luci-base luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system \
              luci-i18n-base-zh-cn luci-theme-argon \
              block-mount fdisk losetup kmod-fs-ext4 openssh-sftp-server \
              php8 php8-cgi php8-mod-curl php8-mod-mbstring php8-mod-openssl php8-mod-session php8-mod-zip \
              nfs-kernel-server luci-i18n-nfs-zh-cn \
              luci-app-samba4 luci-i18n-samba4-zh-cn samba4-server kmod-fs-ksmbd kmod-fs-cifs cifsmount luci-i18n-cifs-mount-zh-cn \
              luci-app-p910nd luci-i18n-p910nd-zh-cn kmod-usb-printer kmod-lp \
              luci-app-hd-idle luci-i18n-hd-idle-zh-cn \
              comgt comgt-ncm uqmi usb-modeswitch wwan kmod-usb-serial-option kmod-usb-net-rndis kmod-usb-net-cdc-ether \
              docker dockerd containerd runc tini docker-compose luci-lib-docker luci-app-dockerman luci-i18n-dockerman-zh-cn \
              luci-app-zerotier luci-i18n-zerotier-zh-cn \
              ./packages/luci-app-easytier ./packages/luci-i18n-easytier-zh-cn \
              ./packages/luci-app-socat ./packages/luci-i18n-socat-zh-cn socat \
              luci-app-ddns-go luci-i18n-ddns-go-zh-cn \
              luci-app-wol luci-i18n-wol-zh-cn \
              luci-app-aria2 luci-i18n-aria2-zh-cn aria2 \
              luci-app-filebrowser luci-i18n-filebrowser-zh-cn \
            " \
            -j$(nproc)

      - name: Upload Firmware to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-N5105-SquashFS-${{ github.event.inputs.immortalwrt_version }}
          path: openwrt/bin/targets/x86/64/*

      - name: Upload Firmware to Release
        uses: softprops/action-gh-release@v2
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: IWrt-N5105-SquashFS-${{ github.event.inputs.immortalwrt_version }}-build${{ github.run_number }}
          name: IWrt N5105 SquashFS ${{ github.event.inputs.immortalwrt_version }} (Build ${{ github.run_number }})
          body: |
            自动编译的 ImmortalWrt N5105 SquashFS 固件 (ImageBuilder)
            - 版本: ${{ github.event.inputs.immortalwrt_version }}
            - 架构: x86_64 (Intel Jasper Lake N5105)
            - 文件系统: **SquashFS (ZSTD 压缩, 256K Block)**
            
            ### 🛠️ N5105 专属优化
            - ✅ Intel UHD Graphics (i915) 驱动 + DMC 固件
            - ✅ Intel CPU 微码更新 + thermald 智能温控
            - ✅ 2.5G 网卡驱动: i225/i226 (igc), RTL8125 (r8125)
            - ✅ ASPM 断流修复脚本 (首次启动自动生效)
            - ✅ ROOTFS_PARTSIZE: 1024MB
            
            ### 📦 已集成核心功能
            Docker / Samba4 / NFS / PHP8 / Aria2 / ZeroTier / EasyTier
            DDNS-Go / WoL / USB打印(p910nd) / 硬盘休眠(hd-idle)
            4G/5G USB上网卡 / Socat / FileBrowser
            
            ### 🔗 第三方插件来源
            - sbwml/openwrt_packages (EasyTier / FileBrowser 等)
            - kiddin9/openwrt-packages (Socat / DDNS-Go 等)
            
            ### ⚠️ 使用说明
            1. 本固件为只读 SquashFS，系统升级保留配置，恢复出厂仅需重置 overlay
            2. Perl 已从本固件中彻底移除，数据库等重型需求请使用 Docker
          files: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.vmdk
            openwrt/bin/targets/x86/64/*.vhdx
